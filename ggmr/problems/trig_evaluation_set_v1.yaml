# Trigonometry evaluation set v1 (Phase 1.2, Marcus)
#
# 30 hand-curated problems: 10 easy + 10 medium + 10 hard.
# The remaining 70 problems (10 easy, 20 medium, 40 hard) are TBD —
# programmatic generation via TrigReverseGenerator (Phase 1.2 extension)
# will populate them.
#
# IDs follow the Marcus naming convention: trig_e01..e20, trig_m01..m30,
# trig_h01..h50. Difficulty mapping:
#   easy:  1-2 steps via primitive rules
#   medium: 3-5 steps mixing rule groups
#   hard:   ≥6 steps; adversarial motifs that punish target-blind heuristics
#
# Each problem carries:
#   id, category, difficulty, variable, source, initial, canonical_target
# `category` matches Marcus's trig rule group (pyth, recip, quot, cof,
# parity, sum, double, prod, etc.) — useful for per-category metrics.

- id: trig_e01
  category: pyth
  difficulty: easy
  variable: x
  source: "Marcus trig_e01"
  initial:
    lhs: "sin(x)**2 + cos(x)**2"
    rhs: "1"
  canonical_target:
    lhs: "0"
    rhs: "0"


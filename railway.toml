[build]
builder = "nixpacks"

[build.nixpacksConfig]
providers = ["python"]

[deploy]
# Training phase 3 v2 is complete; iter_v1 (9.37x hard, the headline result) and
# iter_v2 results are on /data. This deploy just serves /data over HTTP so the
# files stay downloadable at https://ggmr-production.up.railway.app/. A real
# cumulative-ExIt rerun (with the new buffer-persistence code) is a deliberate
# decision and would replace this startCommand with a training pipeline again.
startCommand = "python -m http.server ${PORT:-8080} --bind 0.0.0.0 --directory /data"

[[deploy.volumes]]
name = "round2-data"
mountPath = "/data"

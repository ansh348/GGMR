[build]
builder = "nixpacks"

[build.nixpacksConfig]
providers = ["python"]

[deploy]
startCommand = """pip install -e . && \
  mkdir -p /data && \
  python scripts/generate_round2.py \
    --output /data/training_data_round2.jsonl \
    --report /data/round2_distribution_report.json \
    --jobs-per-category 1000 \
    --workers 32 \
    --progress && \
  echo "DONE: $(wc -l < /data/training_data_round2.jsonl) pairs in /data/training_data_round2.jsonl" && \
  python -m http.server 8080 --directory /data"""

[[deploy.volumes]]
name = "round2-data"
mountPath = "/data"

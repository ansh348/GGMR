[build]
builder = "nixpacks"

[build.nixpacksConfig]
providers = ["python"]

[deploy]
# ============================================================================
# Trig trace generation (Phase 1.3 prep — Marcus).
# Outputs go to /data/trig_training.jsonl; HTTP server keeps them accessible.
# BLAS thread caps preserved (lesson from commit 5491b2a).
# ============================================================================
startCommand = """pip install -e . && \
  export OPENBLAS_NUM_THREADS=1 OMP_NUM_THREADS=1 MKL_NUM_THREADS=1 NUMEXPR_NUM_THREADS=1 && \
  python -c "import ggmr; print('ggmr import OK')" && \
  mkdir -p /data && \
  (cd /data && python -u -m http.server ${PORT:-8080} --bind 0.0.0.0 > /data/http_server_trig.log 2>&1 &) && \
  echo "HTTP file server backgrounded on port ${PORT:-8080}" && \
  echo "=== TRIG TRACE GENERATION (Phase 1.3 prep) ===" && \
  python -u scripts/generate_training_data.py \
    --domain trig \
    --num-problems 20000 \
    --workers 32 \
    --easy-bfs-budget 5000 \
    --hard-bfs-budget 10000 \
    --easy-timeout-s 180 \
    --hard-timeout-s 180 \
    --output /data/trig_training.jsonl \
    --run-id trig_v0 \
    --progress && \
  echo "=== DONE; trig_training.jsonl at https://ggmr-production.up.railway.app/ ===" ; \
  tail -f /dev/null"""

[[deploy.volumes]]
name = "round2-data"
mountPath = "/data"


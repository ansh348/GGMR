[build]
builder = "nixpacks"

[build.nixpacksConfig]
providers = ["python"]

[deploy]
startCommand = "pip install -e . && python scripts/generate_training_data.py --output /app/training_data.jsonl --easy-count 7000 --hard-count 3000 --workers 32 --easy-timeout-s 60 --hard-timeout-s 240 --progress && echo 'DONE -- training_data.jsonl ready' && sleep 86400"
